                                "Google isn't fast because of one clever trick. It's fast because of layered caching. By the time it reaches compute, it's a tiny fraction of the load."
                            </p>
                        </div>
                    )
                },
                {
                    title: "Segment 9: The Final Balance",
                    content: (
                        <div className="space-y-12 fade-in flex flex-col items-center justify-center h-full">
                            <h3 className="handwritten-bold text-5xl text-center mb-10">The Ultimate Trade-off</h3>
                            
                            <div className="relative w-[500px] h-64 mt-12">
                                {/* Balance Scale CSS Art */}
                                <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-6 h-40 bg-slate-800 rounded-t-sm"></div>
                                <div className="absolute bottom-0 left-1/2 -translate-x-1/2 border-l-[40px] border-l-transparent border-r-[40px] border-r-transparent border-b-[40px] border-b-slate-800"></div>
                                
                                <div className="absolute top-10 left-1/2 -translate-x-1/2 w-[400px] h-3 bg-slate-800 rotate-[12deg] origin-center transition-all duration-1000 rounded-full"></div>
                                
                                <div className="absolute top-16 left-4 bg-green-100 sketch-border p-6 text-center w-40 shadow-xl transition-all duration-1000 translate-y-10 rotate-[-12deg]">
                                    <span className="handwritten-bold text-green-700 text-2xl">Slightly<br/>Wrong</span>
                                </div>
                                
                                <div className="absolute top-0 right-4 bg-red-100 sketch-border p-6 text-center w-40 shadow-xl transition-all duration-1000 -translate-y-8 rotate-[-12deg]">
                                    <span className="handwritten-bold text-red-700 text-2xl">SLIGHTLY<br/>SLOW</span>
                                </div>
                            </div>
                            
                            <p className="handwritten text-3xl text-center max-w-4xl mt-12 leading-relaxed">
                                "The cost of being slightly wrong is far lower than the cost of being slow. A stale suggestion is fine. A 500ms delay destroys the product."
                            </p>
                        </div>
                    )
                },
                {
                    title: "Outro & Call to Action",
                    content: (
                        <div className="space-y-8 fade-in h-full flex flex-col items-center justify-center">
                            <h2 className="text-7xl font-black text-slate-800 tracking-tighter">beyondTheInterviews</h2>
                            <p className="handwritten text-3xl text-slate-500 mt-4">Go past the surface.</p>
                            
                            <div className="mt-16 bg-red-600 text-white font-black text-4xl px-16 py-6 rounded-full shadow-2xl cursor-pointer hover:bg-red-700 transition-colors animate-pulse tracking-wide">
                                SUBSCRIBE
                            </div>
                        </div>
                    )
                }
            ];

            return (
                <div className="flex w-full h-[90vh] mx-auto">
                    
                    {/* Main Presentation Area */}
                    <div className="flex-1 bg-slate-800 border-[12px] border-slate-900 rounded-[2rem] shadow-2xl flex flex-col overflow-hidden relative">
                        <div className="ipad-paper flex-grow p-12 overflow-y-auto custom-scrollbar flex flex-col">
                            
                            <header className="flex justify-between items-center mb-8 border-b-[3px] border-slate-200 pb-6">
                                <div>
                                    <p className="text-sm font-black uppercase text-slate-400 tracking-widest mb-1">Slide {page + 1} of {slides.length}</p>
                                    <h1 className="text-3xl font-black text-slate-800">{slides[page].title}</h1>
                                </div>
                                <div className="flex gap-3">
                                    <div className="w-5 h-5 rounded-full bg-red-400 border border-slate-300"></div>
                                    <div className="w-5 h-5 rounded-full bg-yellow-400 border border-slate-300"></div>
                                    <div className="w-5 h-5 rounded-full bg-green-400 border border-slate-300"></div>
                                </div>
                            </header>

                            <main className="flex-grow flex flex-col justify-center relative">
                                {slides[page].content}
                            </main>

                        </div>

                        {/* Navigation Footer */}
                        <footer className="bg-white border-t-2 border-slate-200 p-6 flex justify-between items-center">
                            <button 
                                onClick={() => setPage(p => Math.max(0, p - 1))}
                                disabled={page === 0}
                                className="px-8 py-3 bg-slate-100 rounded-xl font-bold text-lg hover:bg-slate-200 disabled:opacity-30 transition-all text-slate-700"
                            >
                                ← Prev
                            </button>
                            
                            <div className="flex flex-col items-center gap-2">
                                <div className="flex gap-2">
                                    {slides.map((_, i) => (
                                        <div key={i} className={`h-2 rounded-full transition-all ${i === page ? 'w-8 bg-slate-800' : 'w-2 bg-slate-300'}`} />
                                    ))}
                                </div>
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Use Arrow Keys</span>
                            </div>

                            <button 
                                onClick={() => setPage(p => Math.min(slides.length - 1, p + 1))}
                                disabled={page === slides.length - 1}
                                className="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold text-lg hover:bg-blue-700 disabled:opacity-30 shadow-md transition-all"
                            >
                                Next →
                            </button>
                        </footer>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
